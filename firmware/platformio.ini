[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
extra_scripts =
    pre:autorev.py
lib_deps =
    adafruit/Adafruit EPD
    h2zero/NimBLE-Arduino

[env:feather]
board = adafruit_feather_esp32s3
# NOTE: the EPD_RESET is already connected to the feathers reset button/pin
# NOTE: the feather has 2MB of PSRAM onboard, no need to
#       use the 32k of SRAM on the e-ink friend
build_flags =
    '-D EPD_EN=(-1)'
    '-D EPD_DC=(10)'
    '-D EPD_RESET=(-1)'
    '-D EPD_CS=(9)'
    '-D SRAM_CS=(-1)'
    '-D EPD_BUSY=(13)'

# feather w/ adafruit e-ink breakout
[env:fb]
board = adafruit_feather_esp32s3
build_flags =
    '-D EPD_EN=(6)'
    '-D EPD_BUSY=(9)'
    '-D EPD_RESET=(10)'
    '-D SRAM_CS=(11)'
    '-D EPD_DC=(12)'
    '-D EPD_CS=(13)'
