[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
extra_scripts =
    pre:autorev.py
lib_deps =
    adafruit/Adafruit EPD
    adafruit/Adafruit MAX1704X
    h2zero/NimBLE-Arduino

# support for V1 feather: https://www.adafruit.com/product/5477
[env:featherv1]
board = adafruit_feather_esp32s3
build_flags =
    '-D EPD_EN=(6)'
    '-D EPD_BUSY=(9)'
    '-D EPD_RESET=(10)'
    '-D SRAM_CS=(11)'
    '-D EPD_DC=(12)'
    '-D EPD_CS=(13)'
# you can add '-D STARTUP_DELAY_MS=5000'
# or similar to delay initial startup which can be useful for debugging

# support for V2 feather: https://www.adafruit.com/product/5400
[env:featherv2]
board = adafruit_feather_esp32s3
build_flags =
    '-D EPD_EN=(32)'
    '-D EPD_BUSY=(15)'
    '-D EPD_RESET=(33)'
    '-D SRAM_CS=(27)'
    '-D EPD_DC=(12)'
    '-D EPD_CS=(13)'
